<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes float {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
@keyframes core-pulse {
  0%,100% { opacity:.4; }
  50% { opacity:1; }
}
@keyframes orbit {
  0% { opacity:.4; }
  50% { opacity:1; }
  100% { opacity:.4; }
}
</style>

<!-- stars -->
<rect x="2" y="2" width="1" height="1" fill="#c4b5fd" style="animation:orbit 1.4s infinite"/>
<rect x="13" y="3" width="1" height="1" fill="#fef3c7" style="animation:orbit 1.7s infinite .3s"/>

<g style="animation:float 2s ease-in-out infinite;">

  <!-- orbit ring (UNIQUE IDENTIFIER) -->
  <rect x="4" y="5" width="8" height="1" fill="#6366f1" opacity=".6" style="animation:orbit 1.6s infinite"/>
  <rect x="5" y="4" width="6" height="1" fill="#a78bfa" opacity=".6"/>
  <rect x="6" y="6" width="4" height="1" fill="#c4b5fd" opacity=".6"/>

  <!-- serpentine body -->
  <rect x="6" y="7" width="2" height="5" fill="#020617"/>
  <rect x="8" y="8" width="2" height="4" fill="#020617"/>
  <rect x="7" y="10" width="2" height="3" fill="#1e1b4b"/>

  <!-- glowing cosmic core -->
  <rect x="7" y="8" width="2" height="2" fill="#a78bfa" style="animation:core-pulse 1s infinite"/>
  <rect x="7" y="9" width="2" height="1" fill="#fef3c7"/>

  <!-- head (serpent) -->
  <rect x="5" y="6" width="3" height="2" fill="#020617"/>
  <rect x="4" y="7" width="2" height="1" fill="#020617"/>

  <!-- glowing eye -->
  <rect x="6" y="7" width="1" height="1" fill="#fef3c7" style="animation:core-pulse .8s infinite"/>

  <!-- tail taper -->
  <rect x="8" y="12" width="1" height="1" fill="#4c1d95"/>
  <rect x="9" y="13" width="1" height="1" fill="#6366f1"/>

</g>

<!-- cosmic field -->
<rect x="4" y="5" width="8" height="8" fill="#6366f1" opacity=".08" style="animation:core-pulse 2.2s infinite"/>
</svg>
