<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes dirt-rise {
  0%,100% { transform:translateY(0px); opacity:.4; }
  50% { transform:translateY(-1px); opacity:.8; }
}
@keyframes eye-glow {
  0%,100% { opacity:.6; }
  50% { opacity:1; }
}
@keyframes emerge {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
</style>

<!-- grave dirt particles -->
<rect x="2" y="12" width="1" height="1" fill="#52525b" style="animation:dirt-rise 1.6s infinite"/>
<rect x="13" y="13" width="1" height="1" fill="#71717a" style="animation:dirt-rise 1.9s infinite .3s"/>

<g style="animation:emerge 1.5s ease-in-out infinite;">
  <!-- mound -->
  <rect x="4" y="10" width="8" height="3" fill="#3f3f46"/>
  <rect x="5" y="9" width="6" height="2" fill="#52525b"/>

  <!-- body -->
  <rect x="6" y="8" width="4" height="3" fill="#27272a"/>

  <!-- head -->
  <rect x="5" y="7" width="4" height="3" fill="#18181b"/>
  <rect x="4" y="8" width="2" height="2" fill="#18181b"/>

  <!-- eye glow -->
  <rect x="6" y="8" width="1" height="1" fill="#a78bfa" style="animation:eye-glow 1.2s infinite"/>

  <!-- claws -->
  <rect x="4" y="10" width="2" height="1" fill="#09090b"/>
  <rect x="9" y="10" width="2" height="1" fill="#09090b"/>

  <!-- bones detail -->
  <rect x="8" y="9" width="1" height="1" fill="#d4d4d8"/>
  <rect x="9" y="8" width="1" height="1" fill="#a1a1aa"/>
</g>

<!-- shadow base -->
<rect x="5" y="13" width="6" height="1" fill="#000" opacity=".6"/>
</svg>
