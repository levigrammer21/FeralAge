<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
  <!-- long claws -->
  <rect x="1" y="5" width="4" height="1" fill="#991b1b"/>
  <rect x="0" y="4" width="2" height="1" fill="#f87171"/>
  <rect x="0" y="6" width="2" height="1" fill="#dc2626"/>
  <rect x="11" y="5" width="4" height="1" fill="#991b1b"/>
  <rect x="14" y="4" width="2" height="1" fill="#f87171"/>
  <rect x="14" y="6" width="2" height="1" fill="#dc2626"/>

  <!-- claw arms -->
  <rect x="3" y="7" width="3" height="1" fill="#b91c1c"/>
  <rect x="10" y="7" width="3" height="1" fill="#b91c1c"/>

  <!-- body -->
  <rect x="5" y="7" width="6" height="4" fill="#dc2626"/>
  <rect x="6" y="6" width="4" height="2" fill="#ef4444"/>
  <rect x="6" y="8" width="4" height="2" fill="#f87171"/>
