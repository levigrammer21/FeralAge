  <rect x="9" y="5" width="1" height="1" fill="#fef2f2"/>

  <!-- legs -->
  <rect x="4" y="11" width="2" height="1" fill="#7f1d1d"/>
  <rect x="10" y="11" width="2" height="1" fill="#7f1d1d"/>
  <rect x="3" y="12" width="2" height="1" fill="#991b1b"/>
  <rect x="11" y="12" width="2" height="1" fill="#991b1b"/>
