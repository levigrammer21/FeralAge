<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes star-pulse {
  0%,100% { opacity:.35; }
  50% { opacity:1; }
}
@keyframes astral-float {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
</style>

<!-- cosmic motes -->
<rect x="2" y="3" width="1" height="1" fill="#fde68a" style="animation:star-pulse 1.2s infinite"/>
<rect x="13" y="4" width="1" height="1" fill="#c084fc" style="animation:star-pulse 1.5s infinite .2s"/>
<rect x="3" y="12" width="1" height="1" fill="#fef3c7" style="animation:star-pulse 1.8s infinite .4s"/>
<rect x="12" y="11" width="1" height="1" fill="#a78bfa" style="animation:star-pulse 1.4s infinite .6s"/>

<g style="animation:astral-float 1.9s ease-in-out infinite;">
  <!-- glowing antlers -->
  <rect x="4" y="3" width="1" height="3" fill="#fde68a" style="animation:star-pulse 1.3s infinite"/>
  <rect x="3" y="2" width="1" height="1" fill="#fef3c7" style="animation:star-pulse 1.1s infinite"/>
  <rect x="5" y="2" width="1" height="1" fill="#c084fc" style="animation:star-pulse 1.5s infinite .2s"/>
  <rect x="10" y="3" width="1" height="3" fill="#fde68a" style="animation:star-pulse 1.3s infinite .3s"/>
  <rect x="9" y="2" width="1" height="1" fill="#c084fc" style="animation:star-pulse 1.4s infinite .4s"/>
  <rect x="11" y="2" width="1" height="1" fill="#fef3c7" style="animation:star-pulse 1.2s infinite .2s"/>

  <!-- body outline -->
  <rect x="5" y="8" width="7" height="4" fill="#312e81"/>
  <rect x="4" y="9" width="2" height="3" fill="#312e81"/>

  <!-- body fill -->
  <rect x="6" y="8" width="5" height="3" fill="#7c3aed"/>
  <rect x="7" y="7" width="4" height="2" fill="#a78bfa"/>
  <rect x="8" y="9" width="2" height="2" fill="#fef3c7" opacity=".75"/>

  <!-- head -->
  <rect x="4" y="6" width="4" height="4" fill="#4c1d95"/>
  <rect x="5" y="5" width="3" height="2" fill="#8b5cf6"/>

  <!-- eye -->
  <rect x="5" y="7" width="1" height="1" fill="#fef3c7" style="animation:star-pulse 1s infinite"/>

  <!-- snout -->
  <rect x="3" y="8" width="2" height="1" fill="#312e81"/>

  <!-- legs -->
  <rect x="6" y="12" width="1" height="2" fill="#312e81"/>
  <rect x="10" y="12" width="1" height="2" fill="#312e81"/>

  <!-- star tail -->
  <rect x="12" y="9" width="1" height="1" fill="#fde68a" style="animation:star-pulse 1.1s infinite"/>
  <rect x="13" y="8" width="1" height="1" fill="#fef3c7" style="animation:star-pulse 1.3s infinite .2s"/>
</g>
</svg>
