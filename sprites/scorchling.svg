<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes flame-flicker {
  0%,100% { opacity:.6; transform:translateY(0px); }
  50% { opacity:1; transform:translateY(-1px); }
}
@keyframes core-pulse {
  0%,100% { opacity:.7; }
  50% { opacity:1; }
}
</style>

<!-- outer flame -->
<g style="animation:flame-flicker .8s ease-in-out infinite;">
  <rect x="6" y="4" width="4" height="6" fill="#dc2626"/>
  <rect x="5" y="6" width="6" height="5" fill="#ea580c"/>
  <rect x="7" y="3" width="2" height="2" fill="#f97316"/>
  <rect x="6" y="10" width="4" height="2" fill="#dc2626"/>
</g>

<!-- inner flame -->
<g style="animation:flame-flicker 1s ease-in-out infinite .2s;">
  <rect x="6" y="6" width="4" height="4" fill="#f97316"/>
  <rect x="7" y="5" width="2" height="2" fill="#facc15"/>
</g>

<!-- glowing core -->
<rect x="7" y="7" width="2" height="2" fill="#fef3c7" style="animation:core-pulse .7s infinite"/>

<!-- eyes -->
<rect x="7" y="8" width="1" height="1" fill="#000"/>
<rect x="8" y="8" width="1" height="1" fill="#000"/>

<!-- ember sparks -->
<rect x="4" y="8" width="1" height="1" fill="#f97316" opacity=".7" style="animation:flame-flicker 1.2s infinite"/>
<rect x="11" y="7" width="1" height="1" fill="#facc15" opacity=".6" style="animation:flame-flicker 1.4s infinite .3s"/>
</svg>
