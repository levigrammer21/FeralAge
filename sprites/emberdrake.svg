<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes belly-glow {
  0%,100% { opacity:.55; }
  50% { opacity:1; }
}
@keyframes chunky-bounce {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
@keyframes wing-wiggle {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(1px); }
}
</style>

<!-- ember motes -->
<rect x="2" y="4" width="1" height="1" fill="#f97316" style="animation:belly-glow 1.2s infinite"/>
<rect x="13" y="5" width="1" height="1" fill="#facc15" style="animation:belly-glow 1.5s infinite .3s"/>
<rect x="11" y="12" width="1" height="1" fill="#fef3c7" style="animation:belly-glow 1.8s infinite .5s"/>

<g style="animation:chunky-bounce 1.6s ease-in-out infinite;">
  <!-- tiny wings -->
  <g style="animation:wing-wiggle 1.1s ease-in-out infinite;">
    <rect x="3" y="7" width="2" height="2" fill="#7f1d1d"/>
    <rect x="11" y="7" width="2" height="2" fill="#7f1d1d"/>
    <rect x="3" y="8" width="1" height="1" fill="#f97316"/>
    <rect x="12" y="8" width="1" height="1" fill="#f97316"/>
  </g>

  <!-- chunky body outline -->
  <rect x="5" y="7" width="6" height="6" fill="#7f1d1d"/>
  <rect x="6" y="6" width="4" height="2" fill="#7f1d1d"/>

  <!-- body fill -->
  <rect x="6" y="7" width="4" height="5" fill="#dc2626"/>
  <rect x="7" y="6" width="3" height="2" fill="#ef4444"/>

  <!-- glowing belly -->
  <rect x="7" y="9" width="2" height="3" fill="#f97316" style="animation:belly-glow 1s infinite"/>
  <rect x="7" y="10" width="2" height="1" fill="#fef3c7" style="animation:belly-glow .8s infinite"/>

  <!-- head -->
  <rect x="5" y="4" width="5" height="3" fill="#991b1b"/>
  <rect x="6" y="3" width="3" height="2" fill="#ef4444"/>

  <!-- snout -->
  <rect x="4" y="5" width="2" height="1" fill="#7f1d1d"/>

  <!-- eye -->
  <rect x="6" y="5" width="1" height="1" fill="#000"/>
  <rect x="7" y="5" width="1" height="1" fill="#fef3c7"/>

  <!-- horns -->
  <rect x="5" y="3" width="1" height="1" fill="#facc15"/>
  <rect x="9" y="3" width="1" height="1" fill="#facc15"/>

  <!-- arms -->
  <rect x="4" y="9" width="2" height="1" fill="#7f1d1d"/>
  <rect x="10" y="9" width="2" height="1" fill="#7f1d1d"/>

  <!-- feet -->
  <rect x="6" y="13" width="1" height="1" fill="#450a0a"/>
  <rect x="9" y="13" width="1" height="1" fill="#450a0a"/>
</g>

<!-- warm aura -->
<rect x="5" y="6" width="6" height="7" fill="#f97316" opacity=".08" style="animation:belly-glow 2s infinite"/>
</svg>
