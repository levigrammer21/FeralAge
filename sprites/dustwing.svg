<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes drift {0%,100%{opacity:0.3}50%{opacity:0.8}}
</style>

<!-- sand particles -->
<rect x="1" y="10" width="1" height="1" fill="#facc15" opacity="0.3" style="animation:drift 1.2s infinite"/>
<rect x="2" y="11" width="1" height="1" fill="#fde68a" opacity="0.3" style="animation:drift 1.6s infinite"/>
<rect x="13" y="9" width="1" height="1" fill="#facc15" opacity="0.3" style="animation:drift 1.4s infinite"/>

<!-- wings (motion blur) -->
<rect x="3" y="6" width="10" height="2" fill="#78350f"/>
<rect x="4" y="5" width="8" height="1" fill="#a16207" opacity="0.7"/>
<rect x="4" y="8" width="8" height="1" fill="#a16207" opacity="0.7"/>

<!-- body -->
<rect x="6" y="6" width="4" height="4" fill="#92400e"/>

<!-- head -->
<rect x="7" y="4" width="2" height="2" fill="#92400e"/>
<rect x="7" y="4" width="1" height="1" fill="#fef3c7"/>

<!-- beak -->
<rect x="8" y="5" width="1" height="1" fill="#f59e0b"/>

<!-- tail -->
<rect x="7" y="10" width="2" height="2" fill="#78350f"/>

</svg>
