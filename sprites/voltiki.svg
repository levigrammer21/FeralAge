<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes spark {
  0%,100% { opacity:.25; }
  50% { opacity:1; }
}
@keyframes tail-flick {
  0%,100% { transform: translateX(0px); }
  50% { transform: translateX(1px); }
}
</style>

<!-- sparks -->
<rect x="2" y="4" width="1" height="1" fill="#fde047" style="animation:spark .8s infinite"/>
<rect x="13" y="6" width="1" height="1" fill="#facc15" style="animation:spark 1.1s infinite .2s"/>
<rect x="11" y="2" width="1" height="1" fill="#fef3c7" style="animation:spark .9s infinite .4s"/>

<!-- body outline -->
<rect x="5" y="7" width="7" height="4" fill="#1f2937"/>
<rect x="4" y="8" width="2" height="3" fill="#1f2937"/>

<!-- body fill -->
<rect x="5" y="7" width="6" height="3" fill="#65a30d"/>
<rect x="6" y="6" width="4" height="2" fill="#84cc16"/>
<rect x="7" y="7" width="3" height="2" fill="#bef264"/>

<!-- head -->
<rect x="3" y="6" width="4" height="4" fill="#365314"/>
<rect x="4" y="5" width="3" height="2" fill="#65a30d"/>

<!-- eye -->
<rect x="4" y="7" width="1" height="1" fill="#000"/>
<rect x="5" y="7" width="1" height="1" fill="#fef3c7"/>

<!-- electric tail -->
<g style="animation:tail-flick .7s ease-in-out infinite;">
  <rect x="11" y="8" width="2" height="1" fill="#facc15"/>
  <rect x="13" y="7" width="1" height="1" fill="#fde047"/>
  <rect x="14" y="6" width="1" height="1" fill="#fef3c7"/>
  <rect x="13" y="9" width="1" height="1" fill="#f59e0b"/>
</g>

<!-- legs -->
<rect x="5" y="11" width="1" height="2" fill="#1f2937"/>
<rect x="9" y="11" width="1" height="2" fill="#1f2937"/>
</svg>
