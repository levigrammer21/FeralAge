<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes slither {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
@keyframes thorn-glint {
  0%,100% { opacity:.4; }
  50% { opacity:1; }
}
</style>

<!-- thorn particles -->
<rect x="2" y="6" width="1" height="1" fill="#65a30d" style="animation:thorn-glint 1.3s infinite"/>
<rect x="13" y="5" width="1" height="1" fill="#84cc16" style="animation:thorn-glint 1.6s infinite .3s"/>

<g style="animation:slither 1.5s ease-in-out infinite;">
  <!-- body (serpent curve) -->
  <rect x="4" y="9" width="8" height="2" fill="#365314"/>
  <rect x="5" y="8" width="6" height="2" fill="#4d7c0f"/>
  <rect x="6" y="7" width="4" height="2" fill="#65a30d"/>

  <!-- underside -->
  <rect x="5" y="10" width="6" height="1" fill="#1f3d16"/>

  <!-- head -->
  <rect x="3" y="8" width="3" height="2" fill="#365314"/>
  <rect x="2" y="9" width="2" height="1" fill="#1f3d16"/>

  <!-- eye -->
  <rect x="4" y="9" width="1" height="1" fill="#000"/>
  <rect x="5" y="9" width="1" height="1" fill="#bbf7d0"/>

  <!-- thorn spikes -->
  <rect x="5" y="7" width="1" height="1" fill="#84cc16"/>
  <rect x="7" y="6" width="1" height="1" fill="#65a30d"/>
  <rect x="9" y="7" width="1" height="1" fill="#84cc16"/>
  <rect x="11" y="8" width="1" height="1" fill="#65a30d"/>

  <!-- tail -->
  <rect x="11" y="9" width="2" height="1" fill="#4d7c0f"/>
  <rect x="13" y="8" width="1" height="1" fill="#84cc16"/>

  <!-- vine accents -->
  <rect x="6" y="9" width="1" height="2" fill="#166534"/>
  <rect x="8" y="9" width="1" height="2" fill="#166534"/>
</g>

<!-- faint green aura -->
<rect x="4" y="8" width="9" height="4" fill="#84cc16" opacity=".08" style="animation:thorn-glint 2s infinite"/>
</svg>
