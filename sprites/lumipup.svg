<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes glow-pulse {
  0%,100% { opacity:.35; }
  50% { opacity:1; }
}
@keyframes tail-bob {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
</style>

<!-- soft light motes -->
<rect x="2" y="4" width="1" height="1" fill="#fde68a" style="animation:glow-pulse 1.3s infinite"/>
<rect x="13" y="6" width="1" height="1" fill="#fef3c7" style="animation:glow-pulse 1.6s infinite .3s"/>
<rect x="4" y="12" width="1" height="1" fill="#fde047" style="animation:glow-pulse 1.8s infinite .5s"/>

<!-- body outline -->
<rect x="5" y="8" width="7" height="4" fill="#92400e"/>
<rect x="4" y="9" width="2" height="3" fill="#92400e"/>

<!-- body fill -->
<rect x="5" y="8" width="6" height="3" fill="#f59e0b"/>
<rect x="6" y="7" width="4" height="2" fill="#fbbf24"/>
<rect x="7" y="8" width="3" height="2" fill="#fde68a"/>

<!-- head -->
<rect x="3" y="6" width="4" height="4" fill="#b45309"/>
<rect x="4" y="5" width="3" height="2" fill="#f59e0b"/>

<!-- ears -->
<rect x="3" y="5" width="1" height="1" fill="#92400e"/>
<rect x="6" y="4" width="1" height="2" fill="#92400e"/>

<!-- eye -->
<rect x="4" y="7" width="1" height="1" fill="#000"/>
<rect x="5" y="7" width="1" height="1" fill="#fff7ed"/>

<!-- snout -->
<rect x="2" y="8" width="2" height="1" fill="#78350f"/>

<!-- glowing chest -->
<rect x="7" y="9" width="2" height="1" fill="#fef3c7" style="animation:glow-pulse 1s infinite"/>

<!-- tail -->
<g style="animation:tail-bob .9s ease-in-out infinite;">
  <rect x="11" y="7" width="2" height="1" fill="#fbbf24"/>
  <rect x="13" y="6" width="1" height="1" fill="#fef3c7"/>
</g>

<!-- legs -->
<rect x="5" y="12" width="1" height="2" fill="#78350f"/>
<rect x="9" y="12" width="1" height="2" fill="#78350f"/>
</svg>
