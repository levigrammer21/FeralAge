<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes storm-flash {
  0%,100% { opacity:.35; }
  50% { opacity:1; }
}
@keyframes kraken-float {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
@keyframes tentacle-sway {
  0%,100% { transform:translateX(0px); }
  50% { transform:translateX(1px); }
}
</style>

<!-- storm sparks -->
<rect x="2" y="3" width="1" height="1" fill="#fde047" style="animation:storm-flash .9s infinite"/>
<rect x="13" y="4" width="1" height="1" fill="#fef3c7" style="animation:storm-flash 1.2s infinite .2s"/>
<rect x="11" y="12" width="1" height="1" fill="#38bdf8" style="animation:storm-flash 1.5s infinite .4s"/>

<g style="animation:kraken-float 1.7s ease-in-out infinite;">
  <!-- storm cloud head -->
  <rect x="5" y="5" width="6" height="4" fill="#1f2937"/>
  <rect x="4" y="6" width="8" height="3" fill="#374151"/>
  <rect x="6" y="4" width="4" height="2" fill="#4b5563"/>

  <!-- glowing eyes -->
  <rect x="6" y="7" width="1" height="1" fill="#fde047" style="animation:storm-flash .7s infinite"/>
  <rect x="9" y="7" width="1" height="1" fill="#fde047" style="animation:storm-flash .8s infinite .2s"/>

  <!-- lightning core -->
  <rect x="7" y="8" width="2" height="1" fill="#fef3c7" style="animation:storm-flash .8s infinite"/>
  <rect x="8" y="9" width="1" height="1" fill="#fde047" style="animation:storm-flash 1s infinite"/>

  <!-- tentacles -->
  <g style="animation:tentacle-sway 1.1s ease-in-out infinite;">
    <rect x="4" y="9" width="1" height="3" fill="#0369a1"/>
    <rect x="5" y="10" width="1" height="3" fill="#0ea5e9"/>
    <rect x="7" y="9" width="1" height="4" fill="#0284c7"/>
    <rect x="9" y="9" width="1" height="4" fill="#0ea5e9"/>
    <rect x="11" y="9" width="1" height="3" fill="#0369a1"/>
  </g>

  <!-- electric tentacle tips -->
  <rect x="4" y="12" width="1" height="1" fill="#fde047" style="animation:storm-flash .9s infinite"/>
  <rect x="7" y="13" width="1" height="1" fill="#fef3c7" style="animation:storm-flash 1.1s infinite .3s"/>
  <rect x="10" y="12" width="1" height="1" fill="#fde047" style="animation:storm-flash 1s infinite .5s"/>
</g>

<!-- storm aura -->
<rect x="4" y="5" width="8" height="8" fill="#38bdf8" opacity=".08" style="animation:storm-flash 2s infinite"/>
</svg>
