<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes flame-pulse {
  0%,100% { opacity:.55; transform:translateY(0px); }
  50% { opacity:1; transform:translateY(-1px); }
}
@keyframes proud-bob {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
</style>

<!-- ember sparks -->
<rect x="2" y="4" width="1" height="1" fill="#f97316" style="animation:flame-pulse 1.1s infinite"/>
<rect x="13" y="5" width="1" height="1" fill="#facc15" style="animation:flame-pulse 1.4s infinite .2s"/>
<rect x="11" y="2" width="1" height="1" fill="#fef3c7" style="animation:flame-pulse 1.7s infinite .4s"/>

<g style="animation:proud-bob 1.7s ease-in-out infinite;">
  <!-- flame antlers -->
  <rect x="4" y="3" width="1" height="3" fill="#dc2626" style="animation:flame-pulse .9s infinite"/>
  <rect x="3" y="2" width="1" height="1" fill="#f97316" style="animation:flame-pulse 1s infinite"/>
  <rect x="5" y="2" width="1" height="1" fill="#facc15" style="animation:flame-pulse 1.2s infinite .2s"/>
  <rect x="7" y="3" width="1" height="3" fill="#dc2626" style="animation:flame-pulse .9s infinite .3s"/>
  <rect x="8" y="2" width="1" height="1" fill="#f97316" style="animation:flame-pulse 1.1s infinite .4s"/>
  <rect x="6" y="2" width="1" height="1" fill="#facc15" style="animation:flame-pulse 1.3s infinite .1s"/>

  <!-- body outline -->
  <rect x="5" y="8" width="7" height="4" fill="#7f1d1d"/>
  <rect x="4" y="9" width="2" height="3" fill="#7f1d1d"/>

  <!-- body fill -->
  <rect x="5" y="8" width="6" height="3" fill="#dc2626"/>
  <rect x="6" y="7" width="4" height="2" fill="#ea580c"/>
  <rect x="7" y="8" width="3" height="2" fill="#f97316"/>

  <!-- head -->
  <rect x="3" y="6" width="4" height="4" fill="#991b1b"/>
  <rect x="4" y="5" width="3" height="2" fill="#dc2626"/>

  <!-- snout -->
  <rect x="2" y="8" width="2" height="1" fill="#450a0a"/>

  <!-- eye -->
  <rect x="4" y="7" width="1" height="1" fill="#000"/>
  <rect x="5" y="7" width="1" height="1" fill="#fef3c7"/>

  <!-- glowing chest -->
  <rect x="7" y="9" width="2" height="1" fill="#facc15" style="animation:flame-pulse 1s infinite"/>

  <!-- legs -->
  <rect x="5" y="12" width="1" height="2" fill="#450a0a"/>
  <rect x="10" y="12" width="1" height="2" fill="#450a0a"/>
</g>
</svg>
