<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes void-pulse {
  0%,100% { opacity:.4; }
  50% { opacity:1; }
}
@keyframes float {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
@keyframes wing-shimmer {
  0%,100% { opacity:.6; }
  50% { opacity:1; }
}
</style>

<!-- void particles -->
<rect x="2" y="3" width="1" height="1" fill="#6366f1" style="animation:void-pulse 1.2s infinite"/>
<rect x="13" y="4" width="1" height="1" fill="#a78bfa" style="animation:void-pulse 1.5s infinite .3s"/>
<rect x="11" y="12" width="1" height="1" fill="#c4b5fd" style="animation:void-pulse 1.8s infinite .5s"/>

<g style="animation:float 1.7s ease-in-out infinite;">
  <!-- wings (massive, main identity) -->
  <g style="animation:wing-shimmer 1.3s ease-in-out infinite;">
    <!-- left wing -->
    <rect x="2" y="7" width="5" height="3" fill="#020617"/>
    <rect x="3" y="6" width="4" height="2" fill="#0f172a"/>
    <rect x="4" y="8" width="2" height="1" fill="#1e1b4b"/>

    <!-- right wing -->
    <rect x="9" y="7" width="5" height="3" fill="#020617"/>
    <rect x="9" y="6" width="4" height="2" fill="#0f172a"/>
    <rect x="10" y="8" width="2" height="1" fill="#1e1b4b"/>

    <!-- star speckles -->
    <rect x="4" y="7" width="1" height="1" fill="#c4b5fd"/>
    <rect x="10" y="7" width="1" height="1" fill="#a78bfa"/>
  </g>

  <!-- body -->
  <rect x="7" y="6" width="2" height="5" fill="#020617"/>

  <!-- glowing core -->
  <rect x="7" y="8" width="2" height="2" fill="#7c3aed" style="animation:void-pulse 1s infinite"/>

  <!-- eyes -->
  <rect x="6" y="7" width="1" height="1" fill="#a78bfa" style="animation:void-pulse .9s infinite"/>
  <rect x="9" y="7" width="1" height="1" fill="#a78bfa" style="animation:void-pulse 1.1s infinite .2s"/>

  <!-- antenna -->
  <rect x="7" y="5" width="1" height="1" fill="#6366f1"/>
  <rect x="8" y="5" width="1" height="1" fill="#6366f1"/>

  <!-- trailing void tail -->
  <rect x="7" y="11" width="2" height="1" fill="#1e1b4b"/>
  <rect x="8" y="12" width="1" height="1" fill="#4c1d95"/>
</g>

<!-- deep void aura -->
<rect x="3" y="6" width="10" height="5" fill="#6366f1" opacity=".08" style="animation:void-pulse 2s infinite"/>
</svg>
