<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
  <!-- horns -->
  <rect x="2" y="5" width="2" height="1" fill="#374151"/>
  <rect x="1" y="6" width="2" height="1" fill="#6b7280"/>
  <rect x="12" y="5" width="2" height="1" fill="#374151"/>
  <rect x="13" y="6" width="2" height="1" fill="#6b7280"/>

  <!-- head -->
  <rect x="3" y="7" width="4" height="3" fill="#e5e7eb"/>
  <rect x="3" y="7" width="4" height="1" fill="#9ca3af"/> <!-- top shadow -->
  <rect x="3" y="9" width="4" height="1" fill="#d1d5db"/>

  <!-- face outline -->
  <rect x="3" y="7" width="1" height="3" fill="#374151"/>
  <rect x="6" y="7" width="1" height="3" fill="#374151"/>

  <!-- eyes -->
  <rect x="4" y="8" width="1" height="1" fill="#000"/>
  <rect x="5" y="8" width="1" height="1" fill="#000"/>

  <!-- beard -->
  <rect x="4" y="10" width="2" height="2" fill="#9ca3af"/>
  <rect x="4" y="10" width="2" height="1" fill="#6b7280"/>

  <!-- hump -->
  <rect x="7" y="6" width="3" height="2" fill="#f3f4f6"/>
  <rect x="7" y="6" width="3" height="1" fill="#d1d5db"/>
  <rect x="7" y="7" width="1" height="1" fill="#374151"/> <!-- edge -->

  <!-- body -->
  <rect x="7" y="8" width="5" height="3" fill="#e5e7eb"/>
  <rect x="7" y="8" width="5" height="1" fill="#9ca3af"/>
  <rect x="7" y="10" width="5" height="1" fill="#d1d5db"/>

  <!-- rear outline -->
  <rect x="11" y="8" width="1" height="3" fill="#374151"/>

  <!-- legs -->
  <rect x="6" y="11" width="2" height="2" fill="#4b5563"/>
  <rect x="10" y="11" width="1" height="2" fill="#4b5563"/>

  <!-- ground shadow -->
  <rect x="6" y="12" width="6" height="1" fill="#6b7280"/>
</svg>
