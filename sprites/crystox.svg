<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes crystal-pulse {
  0%,100% { opacity:.45; }
  50% { opacity:1; }
}
@keyframes titan-breathe {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
@keyframes horn-glow {
  0%,100% { opacity:.65; }
  50% { opacity:1; }
}
</style>

<!-- crystal motes -->
<rect x="2" y="4" width="1" height="1" fill="#a5f3fc" style="animation:crystal-pulse 1.2s infinite"/>
<rect x="13" y="5" width="1" height="1" fill="#67e8f9" style="animation:crystal-pulse 1.5s infinite .3s"/>
<rect x="11" y="12" width="1" height="1" fill="#cffafe" style="animation:crystal-pulse 1.8s infinite .5s"/>

<g style="animation:titan-breathe 2s ease-in-out infinite;">
  <!-- crystal horns -->
  <rect x="3" y="4" width="2" height="1" fill="#67e8f9" style="animation:horn-glow 1.1s infinite"/>
  <rect x="2" y="3" width="1" height="1" fill="#cffafe" style="animation:horn-glow 1.3s infinite"/>
  <rect x="10" y="4" width="2" height="1" fill="#67e8f9" style="animation:horn-glow 1.1s infinite .2s"/>
  <rect x="12" y="3" width="1" height="1" fill="#cffafe" style="animation:horn-glow 1.3s infinite .3s"/>

  <!-- massive body outline -->
  <rect x="4" y="7" width="9" height="5" fill="#164e63"/>
  <rect x="5" y="6" width="7" height="2" fill="#164e63"/>

  <!-- ox body -->
  <rect x="5" y="7" width="7" height="4" fill="#0e7490"/>
  <rect x="6" y="6" width="5" height="2" fill="#22d3ee"/>
  <rect x="7" y="8" width="4" height="2" fill="#67e8f9"/>

  <!-- crystal plates -->
  <rect x="6" y="5" width="1" height="2" fill="#cffafe" style="animation:crystal-pulse 1.4s infinite"/>
  <rect x="8" y="5" width="1" height="2" fill="#a5f3fc" style="animation:crystal-pulse 1.6s infinite .2s"/>
  <rect x="10" y="5" width="1" height="2" fill="#cffafe" style="animation:crystal-pulse 1.8s infinite .4s"/>

  <!-- head -->
  <rect x="3" y="6" width="5" height="4" fill="#083344"/>
  <rect x="4" y="5" width="3" height="2" fill="#0e7490"/>

  <!-- snout -->
  <rect x="2" y="8" width="2" height="1" fill="#082f49"/>

  <!-- eye -->
  <rect x="5" y="7" width="1" height="1" fill="#cffafe" style="animation:crystal-pulse .9s infinite"/>

  <!-- glowing chest shard -->
  <rect x="8" y="9" width="2" height="1" fill="#cffafe" style="animation:crystal-pulse 1s infinite"/>
  <rect x="9" y="10" width="1" height="1" fill="#a5f3fc" style="animation:crystal-pulse 1.2s infinite"/>

  <!-- legs -->
  <rect x="5" y="12" width="2" height="2" fill="#083344"/>
  <rect x="10" y="12" width="2" height="2" fill="#083344"/>
</g>

<!-- prism aura -->
<rect x="4" y="6" width="9" height="6" fill="#67e8f9" opacity=".1" style="animation:crystal-pulse 2s infinite"/>
</svg>
