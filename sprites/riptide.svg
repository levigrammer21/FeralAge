<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes wave-pulse {
  0%,100% { opacity:.35; transform:translateY(0px); }
  50% { opacity:.9; transform:translateY(-1px); }
}
@keyframes coil-shift {
  0%,100% { transform:translateX(0px); }
  50% { transform:translateX(1px); }
}
</style>

<!-- wave particles -->
<rect x="1" y="10" width="2" height="1" fill="#7dd3fc" opacity=".6" style="animation:wave-pulse 1.2s infinite"/>
<rect x="3" y="12" width="2" height="1" fill="#38bdf8" opacity=".5" style="animation:wave-pulse 1.5s infinite .2s"/>
<rect x="12" y="4" width="2" height="1" fill="#bae6fd" opacity=".5" style="animation:wave-pulse 1.3s infinite .4s"/>

<g style="animation:coil-shift 1.4s ease-in-out infinite;">
  <!-- serpent body outline -->
  <rect x="4" y="9" width="7" height="3" fill="#082f49"/>
  <rect x="8" y="7" width="4" height="3" fill="#082f49"/>
  <rect x="10" y="5" width="3" height="3" fill="#082f49"/>

  <!-- serpent body fill -->
  <rect x="5" y="9" width="5" height="2" fill="#0369a1"/>
  <rect x="8" y="8" width="3" height="2" fill="#0284c7"/>
  <rect x="10" y="6" width="2" height="2" fill="#0ea5e9"/>

  <!-- water highlights -->
  <rect x="6" y="9" width="2" height="1" fill="#7dd3fc"/>
  <rect x="9" y="8" width="1" height="1" fill="#bae6fd"/>
  <rect x="11" y="6" width="1" height="1" fill="#e0f2fe"/>

  <!-- head -->
  <rect x="11" y="4" width="3" height="3" fill="#075985"/>
  <rect x="12" y="3" width="2" height="2" fill="#0ea5e9"/>

  <!-- eye -->
  <rect x="12" y="5" width="1" height="1" fill="#000"/>
  <rect x="13" y="5" width="1" height="1" fill="#bae6fd"/>

  <!-- tail -->
  <rect x="2" y="10" width="3" height="1" fill="#0ea5e9"/>
  <rect x="1" y="11" width="2" height="1" fill="#7dd3fc"/>
</g>
</svg>
