<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes ray-float {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
@keyframes glimmer {
  0%,100% { opacity:.35; }
  50% { opacity:1; }
}
</style>

<!-- light particles -->
<rect x="2" y="4" width="1" height="1" fill="#fef3c7" style="animation:glimmer 1.2s infinite"/>
<rect x="13" y="5" width="1" height="1" fill="#fde68a" style="animation:glimmer 1.5s infinite .3s"/>
<rect x="4" y="12" width="1" height="1" fill="#fef9c3" style="animation:glimmer 1.8s infinite .5s"/>

<g style="animation:ray-float 1.7s ease-in-out infinite;">
  <!-- wings outline -->
  <rect x="3" y="7" width="10" height="2" fill="#92400e"/>
  <rect x="4" y="6" width="8" height="1" fill="#92400e"/>
  <rect x="5" y="9" width="6" height="1" fill="#92400e"/>

  <!-- glowing wings -->
  <rect x="4" y="7" width="8" height="2" fill="#fbbf24"/>
  <rect x="5" y="6" width="6" height="1" fill="#fde68a"/>
  <rect x="6" y="8" width="4" height="1" fill="#fef3c7"/>

  <!-- body -->
  <rect x="7" y="6" width="2" height="5" fill="#b45309"/>
  <rect x="7" y="7" width="2" height="2" fill="#fde68a" style="animation:glimmer 1s infinite"/>

  <!-- eyes -->
  <rect x="6" y="7" width="1" height="1" fill="#000"/>
  <rect x="9" y="7" width="1" height="1" fill="#000"/>

  <!-- tail -->
  <rect x="7" y="11" width="2" height="1" fill="#fef3c7"/>
  <rect x="8" y="12" width="1" height="1" fill="#fde68a" style="animation:glimmer 1.3s infinite"/>
</g>
</svg>
