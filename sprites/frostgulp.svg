<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes frost-breath {
  0%,100% { opacity:.4; transform:translateX(0px); }
  50% { opacity:1; transform:translateX(1px); }
}
@keyframes icy-pulse {
  0%,100% { opacity:.5; }
  50% { opacity:1; }
}
@keyframes heavy-bob {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
</style>

<!-- frost particles -->
<rect x="2" y="4" width="1" height="1" fill="#bae6fd" style="animation:icy-pulse 1.2s infinite"/>
<rect x="13" y="5" width="1" height="1" fill="#7dd3fc" style="animation:icy-pulse 1.5s infinite .3s"/>
<rect x="11" y="12" width="1" height="1" fill="#e0f2fe" style="animation:icy-pulse 1.8s infinite .5s"/>

<g style="animation:heavy-bob 1.9s ease-in-out infinite;">
  <!-- massive beak -->
  <rect x="2" y="7" width="5" height="3" fill="#0ea5e9"/>
  <rect x="3" y="6" width="4" height="2" fill="#38bdf8"/>
  <rect x="2" y="9" width="5" height="1" fill="#0369a1"/>

  <!-- icy core in beak -->
  <rect x="4" y="7" width="2" height="2" fill="#e0f2fe" style="animation:icy-pulse 1s infinite"/>

  <!-- body -->
  <rect x="7" y="8" width="6" height="4" fill="#075985"/>
  <rect x="8" y="7" width="4" height="2" fill="#0ea5e9"/>

  <!-- icy belly -->
  <rect x="9" y="9" width="2" height="2" fill="#bae6fd"/>

  <!-- head -->
  <rect x="6" y="6" width="3" height="3" fill="#075985"/>

  <!-- eye -->
  <rect x="7" y="7" width="1" height="1" fill="#000"/>
  <rect x="8" y="7" width="1" height="1" fill="#e0f2fe"/>

  <!-- frost breath -->
  <rect x="1" y="8" width="2" height="1" fill="#bae6fd" opacity=".6" style="animation:frost-breath 1.3s infinite"/>

  <!-- legs -->
  <rect x="8" y="12" width="1" height="2" fill="#082f49"/>
  <rect x="11" y="12" width="1" height="2" fill="#082f49"/>
</g>

<!-- icy aura -->
<rect x="6" y="7" width="7" height="5" fill="#bae6fd" opacity=".08" style="animation:icy-pulse 2s infinite"/>
</svg>
