<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes moon-glow {
  0%,100% { opacity:.4; }
  50% { opacity:1; }
}
@keyframes stealth-bob {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
@keyframes tail-sway {
  0%,100% { transform:translateX(0px); }
  50% { transform:translateX(1px); }
}
</style>

<!-- moon particles -->
<rect x="2" y="3" width="1" height="1" fill="#c4b5fd" style="animation:moon-glow 1.2s infinite"/>
<rect x="13" y="4" width="1" height="1" fill="#ddd6fe" style="animation:moon-glow 1.6s infinite .3s"/>

<g style="animation:stealth-bob 1.6s ease-in-out infinite;">
  <!-- body outline -->
  <rect x="5" y="8" width="7" height="3" fill="#020617"/>
  <rect x="4" y="9" width="2" height="2" fill="#020617"/>

  <!-- body fill -->
  <rect x="5" y="8" width="6" height="2" fill="#0f172a"/>
  <rect x="6" y="7" width="4" height="2" fill="#111827"/>

  <!-- moon markings -->
  <rect x="7" y="8" width="2" height="1" fill="#a78bfa" style="animation:moon-glow 1.1s infinite"/>
  <rect x="8" y="9" width="1" height="1" fill="#c4b5fd" style="animation:moon-glow 1.4s infinite .2s"/>

  <!-- head -->
  <rect x="3" y="6" width="4" height="3" fill="#020617"/>
  <rect x="4" y="5" width="3" height="2" fill="#0f172a"/>

  <!-- ears -->
  <rect x="3" y="5" width="1" height="1" fill="#020617"/>
  <rect x="6" y="4" width="1" height="2" fill="#020617"/>

  <!-- eye glow -->
  <rect x="4" y="7" width="1" height="1" fill="#c4b5fd" style="animation:moon-glow .9s infinite"/>

  <!-- snout -->
  <rect x="2" y="8" width="2" height="1" fill="#020617"/>

  <!-- tail -->
  <g style="animation:tail-sway 1.2s ease-in-out infinite;">
    <rect x="11" y="7" width="2" height="1" fill="#111827"/>
    <rect x="13" y="6" width="1" height="1" fill="#a78bfa"/>
  </g>

  <!-- legs -->
  <rect x="5" y="11" width="1" height="2" fill="#020617"/>
  <rect x="9" y="11" width="1" height="2" fill="#020617"/>
</g>

<!-- faint aura -->
<rect x="5" y="7" width="7" height="4" fill="#a78bfa" opacity=".08" style="animation:moon-glow 2s infinite"/>
</svg>
