<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes crack-glow {
  0%,100% { opacity:.35; }
  50% { opacity:1; }
}
@keyframes heavy-idle {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
</style>

<!-- dust -->
<rect x="2" y="13" width="2" height="1" fill="#a3a3a3" opacity=".35"/>
<rect x="12" y="13" width="2" height="1" fill="#a3a3a3" opacity=".25"/>

<g style="animation:heavy-idle 1.8s ease-in-out infinite;">
  <!-- body outline -->
  <rect x="4" y="7" width="8" height="5" fill="#1f2937"/>
  <rect x="5" y="6" width="6" height="2" fill="#1f2937"/>

  <!-- stone body -->
  <rect x="5" y="7" width="6" height="4" fill="#57534e"/>
  <rect x="6" y="6" width="5" height="2" fill="#78716c"/>
  <rect x="7" y="8" width="4" height="2" fill="#a8a29e"/>

  <!-- huge jaw -->
  <rect x="2" y="9" width="5" height="3" fill="#292524"/>
  <rect x="3" y="8" width="4" height="2" fill="#44403c"/>
  <rect x="3" y="11" width="4" height="1" fill="#111827"/>

  <!-- teeth -->
  <rect x="3" y="10" width="1" height="1" fill="#f5f5f4"/>
  <rect x="5" y="10" width="1" height="1" fill="#f5f5f4"/>

  <!-- eye -->
  <rect x="6" y="8" width="1" height="1" fill="#f97316" style="animation:crack-glow 1.2s infinite"/>

  <!-- glowing cracks -->
  <rect x="8" y="7" width="1" height="1" fill="#f97316" style="animation:crack-glow 1.4s infinite .2s"/>
  <rect x="9" y="8" width="1" height="2" fill="#ea580c" style="animation:crack-glow 1.6s infinite .4s"/>
  <rect x="6" y="10" width="1" height="1" fill="#f97316" style="animation:crack-glow 1.1s infinite .3s"/>

  <!-- legs -->
  <rect x="5" y="12" width="2" height="2" fill="#292524"/>
  <rect x="10" y="12" width="2" height="2" fill="#292524"/>
</g>
</svg>
