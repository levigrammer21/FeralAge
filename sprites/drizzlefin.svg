<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes drip {
  0%,100% { transform:translateY(0px); opacity:.6; }
  50% { transform:translateY(1px); opacity:1; }
}
@keyframes ripple {
  0%,100% { opacity:.3; }
  50% { opacity:.8; }
}
</style>

<!-- rain drops -->
<rect x="3" y="2" width="1" height="2" fill="#38bdf8" style="animation:drip 1s infinite"/>
<rect x="11" y="1" width="1" height="2" fill="#7dd3fc" style="animation:drip 1.3s infinite .2s"/>

<!-- body outline -->
<rect x="5" y="7" width="6" height="3" fill="#0c4a6e"/>
<rect x="4" y="8" width="2" height="2" fill="#0c4a6e"/>

<!-- body fill -->
<rect x="5" y="7" width="5" height="2" fill="#0284c7"/>
<rect x="6" y="6" width="4" height="2" fill="#38bdf8"/>
<rect x="7" y="7" width="2" height="1" fill="#e0f2fe" opacity=".7"/>

<!-- head -->
<rect x="3" y="7" width="3" height="3" fill="#0369a1"/>

<!-- eye -->
<rect x="4" y="8" width="1" height="1" fill="#000"/>
<rect x="5" y="8" width="1" height="1" fill="#e0f2fe"/>

<!-- fin -->
<rect x="6" y="9" width="2" height="1" fill="#0ea5e9"/>

<!-- tail (droplet style) -->
<g style="animation:drip 1.1s infinite .3s;">
  <rect x="10" y="7" width="2" height="1" fill="#38bdf8"/>
  <rect x="12" y="6" width="1" height="2" fill="#7dd3fc"/>
  <rect x="12" y="8" width="1" height="1" fill="#0284c7"/>
</g>

<!-- ripple under -->
<rect x="6" y="12" width="4" height="1" fill="#7dd3fc" opacity=".4" style="animation:ripple 1.5s infinite"/>
</svg>
