<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes crystal-glint {
  0%,100% { opacity:.5; }
  50% { opacity:1; }
}
@keyframes roll-bob {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
</style>

<!-- crystal sparkles -->
<rect x="2" y="6" width="1" height="1" fill="#a5f3fc" style="animation:crystal-glint 1.2s infinite"/>
<rect x="13" y="5" width="1" height="1" fill="#67e8f9" style="animation:crystal-glint 1.5s infinite .3s"/>

<g style="animation:roll-bob 1.6s ease-in-out infinite;">
  <!-- shell outline -->
  <rect x="4" y="7" width="8" height="4" fill="#164e63"/>
  <rect x="5" y="6" width="6" height="2" fill="#164e63"/>

  <!-- crystal shell -->
  <rect x="5" y="7" width="6" height="3" fill="#22d3ee"/>
  <rect x="6" y="6" width="4" height="2" fill="#67e8f9"/>

  <!-- crystal segments -->
  <rect x="6" y="7" width="1" height="3" fill="#0891b2"/>
  <rect x="8" y="7" width="1" height="3" fill="#0e7490"/>
  <rect x="10" y="7" width="1" height="2" fill="#0891b2"/>

  <!-- head -->
  <rect x="3" y="8" width="3" height="2" fill="#083344"/>
  <rect x="2" y="9" width="1" height="1" fill="#083344"/>

  <!-- eye -->
  <rect x="4" y="8" width="1" height="1" fill="#000"/>
  <rect x="5" y="8" width="1" height="1" fill="#cffafe"/>

  <!-- legs -->
  <rect x="5" y="11" width="1" height="2" fill="#083344"/>
  <rect x="10" y="11" width="1" height="2" fill="#083344"/>
</g>

<!-- ground shadow -->
<rect x="5" y="13" width="7" height="1" fill="#000" opacity=".6"/>
</svg>
