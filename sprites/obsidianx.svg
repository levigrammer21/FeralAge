<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes lava-glow {
  0%,100% { opacity:.45; }
  50% { opacity:1; }
}
@keyframes prowl {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
@keyframes tail-flick {
  0%,100% { transform:translateX(0px); }
  50% { transform:translateX(1px); }
}
</style>

<!-- lava sparks -->
<rect x="2" y="4" width="1" height="1" fill="#f97316" style="animation:lava-glow 1.1s infinite"/>
<rect x="13" y="6" width="1" height="1" fill="#ef4444" style="animation:lava-glow 1.5s infinite .3s"/>
<rect x="11" y="12" width="1" height="1" fill="#facc15" style="animation:lava-glow 1.8s infinite .5s"/>

<g style="animation:prowl 1.7s ease-in-out infinite;">
  <!-- body outline -->
  <rect x="5" y="8" width="7" height="4" fill="#020617"/>
  <rect x="4" y="9" width="2" height="3" fill="#020617"/>

  <!-- obsidian body -->
  <rect x="5" y="8" width="6" height="3" fill="#111827"/>
  <rect x="6" y="7" width="4" height="2" fill="#1f2937"/>

  <!-- lava cracks -->
  <rect x="7" y="8" width="1" height="1" fill="#f97316" style="animation:lava-glow 1s infinite"/>
  <rect x="9" y="9" width="1" height="1" fill="#ef4444" style="animation:lava-glow 1.3s infinite .2s"/>
  <rect x="8" y="10" width="1" height="1" fill="#facc15" style="animation:lava-glow 1.6s infinite .4s"/>

  <!-- head -->
  <rect x="3" y="6" width="4" height="4" fill="#020617"/>
  <rect x="4" y="5" width="3" height="2" fill="#111827"/>

  <!-- ears -->
  <rect x="3" y="5" width="1" height="1" fill="#020617"/>
  <rect x="6" y="4" width="1" height="2" fill="#020617"/>

  <!-- eye -->
  <rect x="4" y="7" width="1" height="1" fill="#f97316" style="animation:lava-glow .8s infinite"/>

  <!-- snout -->
  <rect x="2" y="8" width="2" height="1" fill="#020617"/>

  <!-- tail -->
  <g style="animation:tail-flick 1.1s ease-in-out infinite;">
    <rect x="11" y="7" width="2" height="1" fill="#111827"/>
    <rect x="13" y="6" width="1" height="1" fill="#f97316" style="animation:lava-glow 1s infinite"/>
  </g>

  <!-- legs -->
  <rect x="5" y="12" width="1" height="2" fill="#020617"/>
  <rect x="9" y="12" width="1" height="2" fill="#020617"/>
</g>

<!-- faint lava aura -->
<rect x="5" y="7" width="7" height="5" fill="#ef4444" opacity=".08" style="animation:lava-glow 2s infinite"/>
</svg>
