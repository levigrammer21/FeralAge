<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes ear-glow {
  0%,100% { opacity:.6; }
  50% { opacity:1; }
}
@keyframes tail-flick {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
</style>

<!-- ember sparks -->
<rect x="2" y="7" width="1" height="1" fill="#f97316" opacity=".7" style="animation:ear-glow 1.2s infinite"/>
<rect x="13" y="6" width="1" height="1" fill="#facc15" opacity=".6" style="animation:ear-glow 1.5s infinite .3s"/>

<!-- body outline -->
<rect x="5" y="8" width="7" height="4" fill="#7f1d1d"/>
<rect x="4" y="9" width="2" height="3" fill="#7f1d1d"/>

<!-- body fill -->
<rect x="5" y="8" width="6" height="3" fill="#ea580c"/>
<rect x="6" y="7" width="4" height="2" fill="#f97316"/>
<rect x="7" y="8" width="3" height="2" fill="#fb923c"/>

<!-- head -->
<rect x="3" y="6" width="4" height="4" fill="#991b1b"/>
<rect x="4" y="5" width="3" height="2" fill="#ef4444"/>

<!-- glowing ear tips -->
<rect x="3" y="5" width="1" height="1" fill="#f97316" style="animation:ear-glow .9s infinite"/>
<rect x="6" y="4" width="1" height="1" fill="#facc15" style="animation:ear-glow 1.1s infinite"/>

<!-- eye -->
<rect x="4" y="7" width="1" height="1" fill="#000"/>
<rect x="5" y="7" width="1" height="1" fill="#fde68a"/>

<!-- snout -->
<rect x="2" y="8" width="2" height="1" fill="#7f1d1d"/>

<!-- tail -->
<g style="animation:tail-flick .7s ease-in-out infinite;">
  <rect x="11" y="7" width="2" height="1" fill="#f97316"/>
  <rect x="13" y="6" width="1" height="1" fill="#facc15"/>
  <rect x="14" y="5" width="1" height="1" fill="#fef3c7"/>
</g>

<!-- legs -->
<rect x="5" y="12" width="1" height="2" fill="#450a0a"/>
<rect x="9" y="12" width="1" height="2" fill="#450a0a"/>
</svg>
