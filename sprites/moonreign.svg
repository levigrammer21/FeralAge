<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes moon-pulse {
  0%,100% { opacity:.4; }
  50% { opacity:1; }
}
@keyframes royal-float {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
@keyframes mane-flow {
  0%,100% { opacity:.65; transform:translateX(0px); }
  50% { opacity:1; transform:translateX(1px); }
}
</style>

<!-- moon aura -->
<rect x="2" y="3" width="1" height="1" fill="#fef3c7" style="animation:moon-pulse 1.1s infinite"/>
<rect x="13" y="4" width="1" height="1" fill="#c4b5fd" style="animation:moon-pulse 1.4s infinite .2s"/>
<rect x="11" y="12" width="1" height="1" fill="#ddd6fe" style="animation:moon-pulse 1.7s infinite .4s"/>

<g style="animation:royal-float 1.8s ease-in-out infinite;">
  <!-- crescent crown -->
  <rect x="5" y="2" width="1" height="1" fill="#fef3c7" style="animation:moon-pulse .9s infinite"/>
  <rect x="6" y="1" width="2" height="1" fill="#fde68a" style="animation:moon-pulse 1.1s infinite"/>
  <rect x="8" y="2" width="1" height="1" fill="#c4b5fd" style="animation:moon-pulse 1.3s infinite .2s"/>

  <!-- flowing mane -->
  <g style="animation:mane-flow 1.4s ease-in-out infinite;">
    <rect x="4" y="5" width="4" height="5" fill="#4c1d95"/>
    <rect x="3" y="6" width="2" height="4" fill="#312e81"/>
    <rect x="5" y="4" width="3" height="2" fill="#7c3aed"/>
    <rect x="4" y="8" width="2" height="2" fill="#a78bfa" opacity=".8"/>
  </g>

  <!-- body outline -->
  <rect x="7" y="8" width="6" height="4" fill="#1e1b4b"/>
  <rect x="6" y="9" width="2" height="3" fill="#1e1b4b"/>

  <!-- body fill -->
  <rect x="7" y="8" width="5" height="3" fill="#4c1d95"/>
  <rect x="8" y="7" width="3" height="2" fill="#7c3aed"/>

  <!-- head -->
  <rect x="4" y="5" width="4" height="4" fill="#312e81"/>
  <rect x="5" y="4" width="3" height="2" fill="#4c1d95"/>

  <!-- eye -->
  <rect x="5" y="6" width="1" height="1" fill="#fef3c7" style="animation:moon-pulse .8s infinite"/>

  <!-- snout -->
  <rect x="3" y="7" width="2" height="1" fill="#1e1b4b"/>

  <!-- moon chest mark -->
  <rect x="9" y="9" width="1" height="1" fill="#fef3c7" style="animation:moon-pulse 1s infinite"/>
  <rect x="10" y="10" width="1" height="1" fill="#c4b5fd" style="animation:moon-pulse 1.2s infinite .2s"/>

  <!-- legs -->
  <rect x="7" y="12" width="1" height="2" fill="#1e1b4b"/>
  <rect x="11" y="12" width="1" height="2" fill="#1e1b4b"/>

  <!-- tail -->
  <rect x="12" y="8" width="2" height="1" fill="#7c3aed"/>
  <rect x="14" y="7" width="1" height="1" fill="#fef3c7" style="animation:moon-pulse 1s infinite"/>
</g>

<!-- royal glow -->
<rect x="4" y="5" width="9" height="7" fill="#a78bfa" opacity=".1" style="animation:moon-pulse 2s infinite"/>
</svg>
