<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes bob {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
@keyframes eye-blink {
  0%,90%,100% { opacity:1; }
  95% { opacity:0; }
}
@keyframes dust {
  0%,100% { opacity:.3; }
  50% { opacity:.7; }
}
</style>

<!-- dirt particles -->
<rect x="3" y="12" width="1" height="1" fill="#a16207" style="animation:dust 1.4s infinite"/>
<rect x="12" y="13" width="1" height="1" fill="#92400e" style="animation:dust 1.7s infinite .3s"/>

<g style="animation:bob 1.2s ease-in-out infinite;">
  <!-- body -->
  <rect x="5" y="8" width="6" height="4" fill="#78350f"/>
  <rect x="6" y="7" width="4" height="2" fill="#92400e"/>

  <!-- head -->
  <rect x="4" y="5" width="6" height="4" fill="#78350f"/>
  <rect x="5" y="4" width="4" height="2" fill="#a16207"/>

  <!-- owl face -->
  <rect x="5" y="6" width="1" height="1" fill="#000" style="animation:eye-blink 3s infinite"/>
  <rect x="7" y="6" width="1" height="1" fill="#000" style="animation:eye-blink 3s infinite"/>

  <!-- beak -->
  <rect x="6" y="7" width="1" height="1" fill="#fbbf24"/>

  <!-- claws (mole) -->
  <rect x="4" y="9" width="1" height="2" fill="#451a03"/>
  <rect x="10" y="9" width="1" height="2" fill="#451a03"/>

  <!-- digging paws -->
  <rect x="3" y="10" width="2" height="1" fill="#292524"/>
  <rect x="10" y="10" width="2" height="1" fill="#292524"/>

  <!-- belly -->
  <rect x="6" y="9" width="3" height="2" fill="#d97706"/>
</g>

<!-- ground -->
<rect x="5" y="13" width="6" height="1" fill="#1c1917" opacity=".7"/>
</svg>
