<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
  <!-- shell outline -->
  <rect x="4" y="6" width="8" height="5" fill="#3f2a1d"/>
  <rect x="5" y="5" width="6" height="2" fill="#3f2a1d"/>

  <!-- shell top -->
  <rect x="5" y="6" width="6" height="4" fill="#7c4a2d"/>
  <rect x="6" y="5" width="4" height="2" fill="#9a5b34"/>

  <!-- shell segments -->
  <rect x="6" y="7" width="1" height="3" fill="#5b3822"/>
  <rect x="8" y="7" width="1" height="3" fill="#5b3822"/>
  <rect x="10" y="7" width="1" height="3" fill="#5b3822"/>

  <!-- face -->
  <rect x="5" y="9" width="2" height="2" fill="#6b3f24"/>
  <rect x="5" y="9" width="1" height="2" fill="#3f2a1d"/>

  <!-- eye -->
  <rect x="6" y="9" width="1" height="1" fill="#000"/>

  <!-- nose -->
  <rect x="4" y="10" width="1" height="1" fill="#3f2a1d"/>

  <!-- legs -->
  <rect x="6" y="11" width="1" height="2" fill="#3f2a1d"/>
  <rect x="9" y="11" width="1" height="2" fill="#3f2a1d"/>

  <!-- ground shadow -->
  <rect x="5" y="12" width="6" height="1" fill="#2b1a12"/>
</svg>
