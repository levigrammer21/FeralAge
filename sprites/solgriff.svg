<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes solar-pulse {
  0%,100% { opacity:.45; }
  50% { opacity:1; }
}
@keyframes griff-float {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
@keyframes wing-glow {
  0%,100% { opacity:.65; transform:translateY(0px); }
  50% { opacity:1; transform:translateY(-1px); }
}
</style>

<!-- solar motes -->
<rect x="2" y="3" width="1" height="1" fill="#fef3c7" style="animation:solar-pulse 1.1s infinite"/>
<rect x="13" y="4" width="1" height="1" fill="#fde047" style="animation:solar-pulse 1.4s infinite .2s"/>
<rect x="11" y="12" width="1" height="1" fill="#facc15" style="animation:solar-pulse 1.7s infinite .4s"/>

<g style="animation:griff-float 1.6s ease-in-out infinite;">
  <!-- glowing wings -->
  <g style="animation:wing-glow 1.1s ease-in-out infinite;">
    <rect x="3" y="7" width="4" height="2" fill="#f59e0b"/>
    <rect x="9" y="7" width="4" height="2" fill="#f59e0b"/>
    <rect x="4" y="6" width="3" height="1" fill="#fde047"/>
    <rect x="9" y="6" width="3" height="1" fill="#fde047"/>
    <rect x="5" y="8" width="1" height="1" fill="#fef3c7"/>
    <rect x="10" y="8" width="1" height="1" fill="#fef3c7"/>
  </g>

  <!-- body outline -->
  <rect x="6" y="8" width="5" height="4" fill="#78350f"/>
  <rect x="5" y="9" width="2" height="3" fill="#78350f"/>

  <!-- body fill -->
  <rect x="6" y="8" width="4" height="3" fill="#d97706"/>
  <rect x="7" y="7" width="3" height="2" fill="#f59e0b"/>

  <!-- eagle head -->
  <rect x="4" y="5" width="4" height="4" fill="#fef3c7"/>
  <rect x="5" y="4" width="3" height="2" fill="#fde047"/>

  <!-- beak -->
  <rect x="3" y="7" width="2" height="1" fill="#f59e0b"/>

  <!-- eye -->
  <rect x="5" y="6" width="1" height="1" fill="#000"/>
  <rect x="6" y="6" width="1" height="1" fill="#f97316" style="animation:solar-pulse .9s infinite"/>

  <!-- lion tail -->
  <rect x="10" y="8" width="2" height="1" fill="#92400e"/>
  <rect x="12" y="7" width="1" height="1" fill="#fde047" style="animation:solar-pulse 1s infinite"/>

  <!-- paws -->
  <rect x="6" y="12" width="1" height="2" fill="#78350f"/>
  <rect x="9" y="12" width="1" height="2" fill="#78350f"/>
</g>

<!-- faint gold aura -->
<rect x="4" y="6" width="8" height="6" fill="#fde047" opacity=".08" style="animation:solar-pulse 2s infinite"/>
</svg>
