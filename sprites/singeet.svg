<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
<style>
@keyframes ember-flicker {
  0%,100% { opacity:.45; }
  50% { opacity:1; }
}
@keyframes tail-wag {
  0%,100% { transform:translateY(0px); }
  50% { transform:translateY(-1px); }
}
</style>

<!-- ember sparks -->
<rect x="2" y="5" width="1" height="1" fill="#f97316" opacity=".7" style="animation:ember-flicker 1.1s infinite"/>
<rect x="13" y="8" width="1" height="1" fill="#facc15" opacity=".6" style="animation:ember-flicker 1.4s infinite .3s"/>

<!-- body outline -->
<rect x="5" y="8" width="7" height="3" fill="#7f1d1d"/>
<rect x="4" y="9" width="2" height="2" fill="#7f1d1d"/>

<!-- body fill -->
<rect x="5" y="8" width="6" height="2" fill="#ea580c"/>
<rect x="6" y="7" width="4" height="2" fill="#f97316"/>
<rect x="7" y="8" width="3" height="1" fill="#facc15"/>

<!-- head -->
<rect x="3" y="6" width="4" height="4" fill="#991b1b"/>
<rect x="4" y="5" width="3" height="2" fill="#ef4444"/>

<!-- ear -->
<rect x="4" y="4" width="1" height="1" fill="#f97316"/>

<!-- eye -->
<rect x="4" y="7" width="1" height="1" fill="#000"/>
<rect x="5" y="7" width="1" height="1" fill="#fef3c7"/>

<!-- snout -->
<rect x="2" y="8" width="2" height="1" fill="#7f1d1d"/>

<!-- flame tail -->
<g style="animation:tail-wag .8s ease-in-out infinite;">
  <rect x="11" y="7" width="2" height="1" fill="#f97316"/>
  <rect x="13" y="6" width="1" height="1" fill="#facc15"/>
  <rect x="14" y="5" width="1" height="1" fill="#fef3c7"/>
  <rect x="13" y="8" width="1" height="1" fill="#dc2626"/>
</g>

<!-- legs -->
<rect x="5" y="11" width="1" height="2" fill="#450a0a"/>
<rect x="9" y="11" width="1" height="2" fill="#450a0a"/>
</svg>
