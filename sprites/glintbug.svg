<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges;">
  <style>
    @keyframes glint-flicker {
      0%,100% { opacity:0.45; }
      50% { opacity:1; }
    }
  </style>

  <!-- glow sparks -->
  <rect x="3" y="4" width="1" height="1" fill="#fef3c7" style="animation:glint-flicker 1.1s infinite"/>
  <rect x="12" y="5" width="1" height="1" fill="#fef3c7" style="animation:glint-flicker 1.4s infinite .2s"/>
  <rect x="2" y="11" width="1" height="1" fill="#fde047" style="animation:glint-flicker 1.3s infinite .4s"/>
  <rect x="13" y="10" width="1" height="1" fill="#fde047" style="animation:glint-flicker 1.6s infinite .6s"/>

  <!-- wings -->
  <rect x="3" y="6" width="3" height="3" fill="#fef9c3" opacity="0.55"/>
  <rect x="10" y="6" width="3" height="3" fill="#fef9c3" opacity="0.55"/>
  <rect x="4" y="7" width="2" height="2" fill="#fde68a" opacity="0.45"/>
  <rect x="10" y="7" width="2" height="2" fill="#fde68a" opacity="0.45"/>

  <!-- body outline -->
  <rect x="6" y="5" width="4" height="7" fill="#713f12"/>
  <rect x="5" y="7" width="6" height="4" fill="#713f12"/>

  <!-- body fill -->
  <rect x="6" y="6" width="4" height="5" fill="#ca8a04"/>
  <rect x="7" y="5" width="2" height="2" fill="#facc15"/>
  <rect x="7" y="8" width="2" height="3" fill="#fde047"/>

  <!-- glowing core -->
  <rect x="7" y="8" width="2" height="2" fill="#fff7ad" style="animation:glint-flicker .8s infinite"/>

  <!-- eyes -->
  <rect x="6" y="7" width="1" height="1" fill="#111827"/>
  <rect x="9" y="7" width="1" height="1" fill="#111827"/>

  <!-- legs -->
  <rect x="5" y="11" width="1" height="1" fill="#422006"/>
  <rect x="10" y="11" width="1" height="1" fill="#422006"/>
  <rect x="4" y="12" width="2" height="1" fill="#422006"/>
  <rect x="10" y="12" width="2" height="1" fill="#422006"/>
</svg>
