<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Feral Age</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a26;
    --panel: #16161f;
    --border: #2a2a3d;
    --accent: #7c5cbf;
    --accent2: #c084fc;
    --gold: #f59e0b;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --orange: #f97316;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --common: #94a3b8;
    --uncommon: #22c55e;
    --rare: #3b82f6;
    --epic: #a855f7;
    --legendary: #f59e0b;
    --pixel: 'Press Start 2P', monospace;
    --vt: 'VT323', monospace;
  }

  /* ===== RESET & BASE ===== */
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--vt); font-size: 18px; min-height: 100vh; overflow-x: hidden; }
  body::after { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); pointer-events: none; z-index: 9999; }

  /* ===== SCREENS ===== */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }
  #loginScreen { background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0a0f 70%); align-items: center; justify-content: center; padding: 20px; }

  /* ===== LOGIN ===== */
  .game-logo { text-align: center; margin-bottom: 40px; }
  .game-logo h1 { font-family: var(--pixel); font-size: 22px; color: var(--accent2); text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); letter-spacing: 4px; line-height: 1.6; }
  .game-logo .subtitle { font-family: var(--vt); font-size: 20px; color: var(--text2); margin-top: 8px; }
  #loginSprite { width: 80px; height: 80px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .player-select { width: 100%; max-width: 420px; }
  .avatar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
  .avatar-btn { background: var(--panel); border: 2px solid var(--border); color: var(--text); font-family: var(--vt); padding: 16px 8px; cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: all 0.15s; }
  .avatar-btn:active { border-color: var(--accent2); background: var(--bg3); transform: scale(0.94); }
  .avatar-btn .av-icon { font-size: 44px; }
  .avatar-btn .av-name { color: var(--accent2); font-size: 16px; line-height: 1.2; }
  .avatar-btn .av-sub { color: var(--text2); font-size: 13px; }

  /* ===== PIN ===== */
  .pin-container { width: 100%; max-width: 320px; text-align: center; }
  .pin-title { font-family: var(--pixel); font-size: 11px; color: var(--accent2); margin-bottom: 24px; }
  .pin-dots { display: flex; justify-content: center; gap: 16px; margin-bottom: 32px; }
  .pin-dot { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 50%; transition: all 0.15s; }
  .pin-dot.filled { background: var(--accent2); border-color: var(--accent2); }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .pin-key { background: var(--panel); border: 2px solid var(--border); color: var(--text); font-family: var(--pixel); font-size: 16px; padding: 18px; cursor: pointer; transition: all 0.1s; }
  .pin-key:active { background: var(--accent); transform: scale(0.95); }
  .pin-key.del { color: var(--red); }
  .pin-key.empty { background: transparent; border-color: transparent; cursor: default; }
  .pin-error { color: var(--red); font-size: 18px; margin-top: 16px; min-height: 24px; }

  /* ===== GAME LAYOUT ===== */
  #gameScreen { padding-bottom: 70px; }
  .topbar { background: var(--panel); border-bottom: 2px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-name { font-family: var(--pixel); font-size: 9px; color: var(--accent2); }
  .topbar-stats { display: flex; gap: 16px; font-size: 18px; }
  .shard-count { color: var(--gold); }
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel); border-top: 2px solid var(--border); display: flex; z-index: 100; }
  .nav-btn { flex: 1; background: none; border: none; color: var(--text2); font-family: var(--vt); font-size: 11px; padding: 10px 4px 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color 0.15s; }
  .nav-btn .nav-icon { font-size: 22px; }
  .nav-btn.active { color: var(--accent2); }
  .tab-content { display: none; padding: 16px; }
  .tab-content.active { display: block; }

  /* ===== COMMON UI ===== */
  .section-title { font-family: var(--pixel); font-size: 10px; color: var(--accent2); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); letter-spacing: 2px; }
  .card { background: var(--panel); border: 2px solid var(--border); padding: 14px; margin-bottom: 12px; }
  .helper-text { color: var(--text2); font-size: 16px; text-align: center; margin-bottom: 12px; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 18px; }
  .empty-state .empty-icon { font-size: 48px; display: block; margin-bottom: 12px; }

  /* ===== BUTTONS ===== */
  .btn { background: var(--accent); border: 2px solid var(--accent2); color: white; font-family: var(--pixel); font-size: 8px; padding: 12px 8px; cursor: pointer; transition: all 0.1s; letter-spacing: 1px; width: 100%; }
  .btn:active { transform: scale(0.96); opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-sm { font-size: 7px; padding: 8px 6px; }
  .btn-green { background: #166534; border-color: var(--green); }
  .btn-red { background: #7f1d1d; border-color: var(--red); }
  .btn-gold { background: #78350f; border-color: var(--gold); color: var(--gold); }
  .btn-blue { background: #1e3a5f; border-color: var(--blue); }
  .btn-gray { background: var(--bg3); border-color: var(--border); color: var(--text2); }
  .btn-tame { background: #064e3b; border-color: #10b981; color: #10b981; font-size: 9px; }

  /* ===== FERAL CARDS ===== */
  .feral-card { display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .feral-sprite { font-size: 40px; width: 56px; text-align: center; flex-shrink: 0; }
  .feral-info { flex: 1; min-width: 0; }
  .feral-name { font-family: var(--pixel); font-size: 9px; color: var(--text); margin-bottom: 4px; }
  .feral-sub { color: var(--text2); font-size: 16px; }

  /* ===== RARITY ===== */
  .rarity-badge { font-family: var(--pixel); font-size: 7px; padding: 3px 6px; border: 1px solid; }
  .rarity-common { color: var(--common); border-color: var(--common); }
  .rarity-uncommon { color: var(--uncommon); border-color: var(--uncommon); }
  .rarity-rare { color: var(--rare); border-color: var(--rare); }
  .rarity-epic { color: var(--epic); border-color: var(--epic); }
  .rarity-legendary { color: var(--legendary); border-color: var(--legendary); }

  /* ===== HP / SP BARS ===== */
  .hp-bar-wrap { margin-top: 6px; }
  .hp-bar { height: 6px; background: var(--bg3); border: 1px solid var(--border); overflow: hidden; }
  .hp-fill { height: 100%; background: var(--green); transition: width 0.3s; }
  .sp-bar-wrap { margin-top: 4px; }
  .sp-bar { height: 4px; background: var(--bg3); border: 1px solid var(--border); overflow: hidden; }
  .sp-fill { height: 100%; background: var(--accent2); transition: width 0.3s; }

  /* ===== STATS ===== */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
  .stat-box { background: var(--bg3); border: 1px solid var(--border); padding: 6px; text-align: center; }
  .stat-label { color: var(--text2); font-size: 14px; }
  .stat-val { color: var(--accent2); font-size: 20px; font-weight: bold; }

  /* ===== TRAP / FORAGE AREA ===== */
  .trap-area { background: var(--panel); border: 2px solid var(--border); padding: 20px; text-align: center; margin-bottom: 16px; }
  .trap-icon { font-size: 60px; margin-bottom: 12px; display: block; }
  .trap-status { font-family: var(--pixel); font-size: 9px; color: var(--accent2); margin-bottom: 8px; }
  .trap-timer { font-size: 32px; color: var(--gold); margin-bottom: 16px; }
  .forage-area { background: var(--panel); border: 2px solid var(--border); padding: 20px; text-align: center; margin-bottom: 16px; }
  .forage-icon { font-size: 56px; margin-bottom: 12px; display: block; }
  .material-card { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--bg3); border: 1px solid var(--border); margin-bottom: 6px; }
  .recipe-card { background: var(--bg3); border: 1px solid var(--border); padding: 12px; margin-bottom: 8px; }
  .recipe-name { font-family: var(--pixel); font-size: 8px; color: var(--accent2); margin-bottom: 6px; }
  .recipe-ingredients { color: var(--text2); font-size: 15px; }

  /* ===== BATTLE ===== */
  .battle-arena { background: linear-gradient(180deg, #0d0d1a 0%, #1a0a2e 50%, #0d1a0d 100%); border: 2px solid var(--border); padding: 12px 16px; margin-bottom: 8px; position: relative; overflow: hidden; flex-shrink: 0; }
  .battle-fighters { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .fighter { text-align: center; width: 45%; transition: transform 0.15s; }
  .fighter-sprite { font-size: 56px; display: block; margin-bottom: 8px; }
  .fighter-name { font-family: var(--pixel); font-size: 7px; color: var(--text); margin-bottom: 6px; }
  .vs-text { font-family: var(--pixel); font-size: 14px; color: var(--border); }
  .battle-log { background: var(--bg); border: 1px solid var(--border); padding: 10px; font-size: 18px; color: var(--text2); min-height: 80px; max-height: 200px; overflow-y: auto; }
  .battle-log .log-entry { margin-bottom: 4px; }
  .log-hit { color: var(--red); }
  .log-special { color: var(--accent2); }
  .log-ability { color: var(--gold); }
  .log-info { color: var(--text2); }
  .log-tame { color: #10b981; }
  .battle-preview { background: var(--panel); border: 2px solid var(--border); padding: 16px; margin-bottom: 12px; text-align: center; }
  .battle-preview-fighters { display: flex; align-items: center; justify-content: space-around; margin-bottom: 12px; }
  .battle-preview-fighter { text-align: center; }
  .battle-preview-name { font-family: var(--pixel); font-size: 7px; color: var(--text); margin-top: 6px; }
  .battle-preview-stats { color: var(--text2); font-size: 14px; }
  .tame-section { background: #064e3b; border: 2px solid #10b981; padding: 12px; margin-top: 8px; text-align: center; }
  .tame-chance { font-family: var(--pixel); font-size: 9px; color: #10b981; margin-bottom: 8px; }

  /* ===== BATTLE ANIMATIONS ===== */
  .fighter.attacking { animation: attack-left 0.3s ease; }
  .fighter.attacking-right { animation: attack-right 0.3s ease; }
  .fighter.hurt { animation: hurt 0.3s ease; }
  .fighter.defeated { animation: tumble 0.5s ease forwards; }
  @keyframes attack-left { 0% { transform: translateX(0); } 50% { transform: translateX(40px); } 100% { transform: translateX(0); } }
  @keyframes attack-right { 0% { transform: translateX(0); } 50% { transform: translateX(-40px); } 100% { transform: translateX(0); } }
  @keyframes hurt { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
  @keyframes tumble { 0% { transform: rotate(0deg) translateY(0); opacity: 1; } 50% { transform: rotate(45deg) translateY(10px); opacity: 0.7; } 100% { transform: rotate(90deg) translateY(20px); opacity: 0; } }

  /* ===== SHINY ===== */
  @keyframes shiny-glow { 0%, 100% { filter: drop-shadow(0 0 6px gold) drop-shadow(0 0 12px gold); } 50% { filter: drop-shadow(0 0 12px gold) drop-shadow(0 0 24px orange); } }
  @keyframes shiny-invert-glow { 0%, 100% { filter: invert(1) drop-shadow(0 0 6px #c084fc) drop-shadow(0 0 12px #c084fc); } 50% { filter: invert(1) drop-shadow(0 0 12px #c084fc) drop-shadow(0 0 24px white); } }
  .shiny-glow { animation: shiny-glow 2s ease-in-out infinite; }
  .shiny-invert { filter: invert(1); }
  .shiny-both { animation: shiny-invert-glow 2s ease-in-out infinite; }
  .shiny-badge { font-family: var(--pixel); font-size: 7px; padding: 2px 6px; border: 1px solid; margin-left: 4px; }
  .shiny-badge-glow { color: var(--gold); border-color: var(--gold); }
  .shiny-badge-invert { color: var(--accent2); border-color: var(--accent2); }
  .shiny-badge-both { color: white; border-color: white; background: linear-gradient(90deg, gold, #c084fc); }

  /* ===== MODAL ===== */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--panel); border: 2px solid var(--accent); width: 100%; max-width: 400px; max-height: 80vh; overflow-y: auto; padding: 20px; }
  .modal-title { font-family: var(--pixel); font-size: 10px; color: var(--accent2); margin-bottom: 16px; text-align: center; }
  .modal-close { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); font-family: var(--pixel); font-size: 8px; padding: 8px 16px; cursor: pointer; width: 100%; margin-top: 16px; }
  .scroll-list { max-height: 60vh; overflow-y: auto; }

  /* ===== SHOP / MARKET ===== */
  .shop-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg3); border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; }
  .shop-item:active { border-color: var(--gold); }
  .shop-item-icon { font-size: 28px; }
  .shop-item-info { flex: 1; }
  .shop-item-name { font-family: var(--pixel); font-size: 8px; color: var(--text); }
  .shop-item-desc { color: var(--text2); font-size: 15px; margin-top: 4px; }
  .shop-item-price { color: var(--gold); font-size: 18px; white-space: nowrap; }
  .market-listing { display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--bg3); border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; }
  .market-listing:active { border-color: var(--gold); }
  .market-listing-info { flex: 1; }
  .market-listing-name { font-family: var(--pixel); font-size: 8px; color: var(--text); }
  .market-listing-sub { color: var(--text2); font-size: 15px; margin-top: 3px; }
  .market-listing-price { color: var(--gold); font-size: 20px; white-space: nowrap; }
  .market-filter-bar { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
  .loot-item { display: flex; align-items: center; gap: 10px; padding: 8px; background: var(--bg3); border: 1px solid var(--border); margin-bottom: 6px; }

  /* ===== LEADERBOARD ===== */
  .leaderboard-row { display: flex; align-items: center; gap: 12px; padding: 10px; background: var(--bg3); border: 1px solid var(--border); margin-bottom: 6px; }
  .leaderboard-rank { font-family: var(--pixel); font-size: 10px; color: var(--gold); width: 24px; text-align: center; }
  .leaderboard-info { flex: 1; }
  .leaderboard-val { color: var(--accent2); font-size: 20px; }

  /* ===== PVP ===== */
  .pvp-challenge { background: var(--bg3); border: 1px solid var(--border); padding: 12px; margin-bottom: 8px; }
  .pvp-challenge-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .pvp-result-win { color: var(--green); font-family: var(--pixel); font-size: 8px; }
  .pvp-result-loss { color: var(--red); font-family: var(--pixel); font-size: 8px; }
  .pvp-result-pending { color: var(--gold); font-family: var(--pixel); font-size: 8px; }

  /* ===== TAMER ===== */
  .tamer-stat-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--bg3); border: 1px solid var(--border); margin-bottom: 6px; }
  .tamer-stat-label { color: var(--text2); font-size: 17px; }
  .tamer-stat-val { color: var(--accent2); font-family: var(--pixel); font-size: 9px; }
  .tamer-avatar { width: 80px; height: 80px; background: var(--bg3); border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 0 auto 16px; }

  /* ===== SELECT FERAL LIST ===== */
  .select-feral-list { display: flex; flex-direction: column; gap: 10px; }
  .select-feral-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg3); border: 2px solid var(--border); cursor: pointer; }
  .select-feral-item:active { border-color: var(--accent2); }
  .select-feral-item .sfi-info { flex: 1; }
  .select-feral-item .sfi-name { font-family: var(--pixel); font-size: 8px; color: var(--text); }
  .select-feral-item .sfi-stats { color: var(--text2); font-size: 16px; margin-top: 4px; }

  /* ===== ITEM SLOTS ===== */
  .item-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
  .item-slot { background: var(--bg3); border: 1px solid var(--border); padding: 8px; text-align: center; cursor: pointer; min-height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .item-slot:active { border-color: var(--accent2); }
  .item-slot-icon { font-size: 24px; }
  .item-slot-name { font-size: 13px; color: var(--text2); }
  .item-slot-type { font-family: var(--pixel); font-size: 6px; color: var(--border); }
  .ability-tag { display: inline-block; background: var(--bg3); border: 1px solid var(--accent); color: var(--accent2); font-size: 14px; padding: 2px 8px; margin: 2px; }

  /* ===== NOTIFICATIONS ===== */
  .notif { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: var(--panel); border: 2px solid var(--accent2); color: var(--accent2); font-family: var(--pixel); font-size: 8px; padding: 10px 16px; z-index: 300; animation: notif-in 0.2s ease, notif-out 0.3s ease 2s forwards; white-space: nowrap; max-width: 90vw; }
  @keyframes notif-in { from { opacity: 0; top: 60px; } to { opacity: 1; top: 70px; } }
  @keyframes notif-out { from { opacity: 1; } to { opacity: 0; } }

  /* ===== ROSTER GRID ===== */
  .feral-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .feral-grid-card { background: var(--panel); border: 2px solid var(--border); padding: 8px 4px; text-align: center; cursor: pointer; position: relative; transition: border-color 0.15s; user-select: none; }
  .feral-grid-card:active { border-color: var(--accent2); transform: scale(0.97); }
  .feral-grid-card.dragging { opacity: 0.4; border-color: var(--accent2); }
  .feral-grid-card.drag-over { border-color: var(--gold); background: var(--bg3); }
  .feral-grid-card.fallen-card { opacity: 0.5; }
  .fgc-name { font-family: var(--pixel); font-size: 6px; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fgc-hp { height: 4px; background: var(--bg3); border: 1px solid var(--border); margin: 3px 2px; overflow: hidden; }
  .fgc-hp-fill { height: 100%; background: var(--green); }
  .fgc-rarity { font-family: var(--pixel); font-size: 5px; padding: 1px 3px; border: 1px solid; display: inline-block; margin-top: 2px; }
  .fgc-fallen-badge { position: absolute; top: 2px; right: 2px; font-size: 10px; }
  .fgc-shiny-badge { position: absolute; top: 2px; left: 2px; font-size: 10px; }

  /* ===== FILTER / SORT BUTTONS ===== */
  .filter-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); font-family: var(--pixel); font-size: 7px; padding: 6px 10px; cursor: pointer; white-space: nowrap; }
  .filter-btn.active { background: var(--accent); border-color: var(--accent2); color: white; }
  .sort-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); font-family: var(--pixel); font-size: 6px; padding: 5px 7px; cursor: pointer; white-space: nowrap; }
  .sort-btn.active { background: var(--bg3); border-color: var(--gold); color: var(--gold); }

  /* ===== DEX ===== */
  .dex-card { background: var(--panel); border: 2px solid var(--border); padding: 8px 4px; text-align: center; position: relative; }
  .dex-card.dex-unseen { opacity: 0.35; filter: grayscale(1); }
  .dex-shiny-row { display: flex; justify-content: center; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .dex-shiny-pip { padding: 1px 4px; border: 1px solid; font-family: var(--pixel); font-size: 5px; }
  .dex-count-badge { position: absolute; top: 3px; right: 3px; background: var(--accent); color: white; font-family: var(--pixel); font-size: 6px; padding: 2px 4px; }

  /* ===== NICKNAME INPUT ===== */
  .nickname-input { width: 100%; background: var(--bg3); border: 2px solid var(--border); color: var(--text); font-family: var(--pixel); font-size: 10px; padding: 10px; margin-bottom: 8px; outline: none; }
  .nickname-input:focus { border-color: var(--accent2); }

  /* ===== FISHING ===== */
  .fishing-bar-wrap { position: relative; height: 52px; background: var(--bg3); border: 2px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
